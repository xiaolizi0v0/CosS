name: Release

on:
  pull_request:
    branches:
      - "main"
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag, for example v0.11.1. Leave empty to only build artifacts."
        required: false
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate release tag input
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ] && [[ ! "${{ github.event.inputs.tag }}" =~ ^v ]]; then
            echo "Release tags must start with v, for example v0.11.1." >&2
            exit 1
          fi
          echo "release_tag=${tag}" >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: npm ci

      - name: Validate Blueprint module
        run: npm run test:blueprint:syntax && npm run test:blueprint:release

  build:
    name: Package ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
      USE_HARD_LINKS: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            builder_args: --win nsis msi zip --x64
            include_helper: true
          - label: linux-x64
            os: ubuntu-latest
            builder_args: --linux AppImage deb rpm --x64
            include_helper: false
          - label: linux-arm64
            os: ubuntu-24.04-arm
            builder_args: --linux AppImage deb rpm --arm64
            include_helper: false
          - label: macos-x64
            os: macos-latest
            builder_args: --mac dmg tar.gz --x64
            include_helper: false
          - label: macos-arm64
            os: macos-latest
            builder_args: --mac dmg tar.gz --arm64
            include_helper: false
          - label: macos-universal
            os: macos-latest
            builder_args: --mac dmg tar.gz --universal
            include_helper: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up .NET
        if: ${{ matrix.include_helper }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Linux packaging dependencies
        if: startsWith(matrix.label, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Prepare native terminal helper directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-work/coss-terminal-helper | Out-Null

      - name: Build native terminal helper
        if: ${{ matrix.include_helper }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $log = "build-${{ matrix.label }}.log"

          dotnet publish native/coss-terminal-helper/CosS.TerminalHelper.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            -o release-work/coss-terminal-helper 2>&1 | Tee-Object -FilePath $log -Append

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Package installers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $log = "build-${{ matrix.label }}.log"

          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.ref_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag/ref name is empty."
          }

          if (Test-Path dist) {
            Remove-Item -Recurse -Force dist
          }
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          & npx electron-builder ${{ matrix.builder_args }} --publish never 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $patterns = @("*.exe", "*.msi", "*.zip", "*.AppImage", "*.deb", "*.rpm", "*.dmg", "*.tar.gz")
          foreach ($pattern in $patterns) {
            Get-ChildItem -Path dist -File -Filter $pattern -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination release-assets -Force
            }
          }

          $assetCount = @(Get-ChildItem release-assets -File).Count
          if ($assetCount -eq 0) {
            throw "electron-builder produced no release assets."
          }

          Get-ChildItem release-assets -File | Sort-Object Name | Format-Table Name, Length

      - name: Print build log on failure
        if: failure()
        shell: pwsh
        run: |
          $log = "build-${{ matrix.label }}.log"
          Write-Host "=== BUILD LOG: $log ==="
          if (Test-Path $log) {
            Get-Content $log -Tail 200
          } else {
            Write-Host "Log file not found."
          }

      - name: Summarize warnings
        if: always()
        shell: pwsh
        run: |
          $log = "build-${{ matrix.label }}.log"
          $warnings = "warnings-${{ matrix.label }}.txt"
          if (Test-Path $log) {
            Select-String -Path $log -Pattern "warning|warn" | ForEach-Object { $_.Line } | Set-Content -Encoding UTF8 $warnings
          } else {
            New-Item -ItemType File -Force -Path $warnings | Out-Null
          }

          $warningCount = 0
          if (Test-Path $warnings) {
            $warningCount = @(Get-Content $warnings | Where-Object { $_ }).Count
          }

          "## ${{ matrix.label }}" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- warnings: $warningCount" >> $env:GITHUB_STEP_SUMMARY
          "- log: $log" >> $env:GITHUB_STEP_SUMMARY
          if ($warningCount -gt 0) {
            "" >> $env:GITHUB_STEP_SUMMARY
            '```text' >> $env:GITHUB_STEP_SUMMARY
            Get-Content $warnings -TotalCount 200 >> $env:GITHUB_STEP_SUMMARY
            '```' >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.label }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            build-${{ matrix.label }}.log
            warnings-${{ matrix.label }}.txt

      - name: Upload platform assets
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.label }}
          retention-days: 7
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.tag, 'v')) }}
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download platform assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Add source archive
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          if [ -z "$tag" ]; then
            echo "RELEASE_TAG is empty. Push a v* tag or provide workflow_dispatch input 'tag'." >&2
            exit 1
          fi

          mkdir -p release-assets
          git archive --format=zip --output="release-assets/CosS-Desktop-${tag}-source.zip" HEAD
          ls -lh release-assets

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release assets
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          for file in release-assets/*; do
            case "$file" in
              *.sig|*.pem|*checksums.txt) continue ;;
            esac
            cosign sign-blob --yes \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              "$file"
          done

      - name: Add checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd release-assets && sha256sum * | sort -k2 > checksums.txt)
          cosign sign-blob --yes \
            --output-signature release-assets/checksums.txt.sig \
            --output-certificate release-assets/checksums.txt.pem \
            release-assets/checksums.txt
          ls -lh release-assets

      - name: Upload combined workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ env.RELEASE_TAG }}
          retention-days: 30
          path: release-assets/*
          if-no-files-found: error

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail

          notes_file="文档/CosS ${RELEASE_TAG} 发布说明.md"
          if [[ ! -s "$notes_file" ]]; then
            echo "Release notes are missing or empty: $notes_file" >&2
            exit 1
          fi

          cp "$notes_file" release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: CosS Desktop ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          generate_release_notes: true
          files: release-assets/*
