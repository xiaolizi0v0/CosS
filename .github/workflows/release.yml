name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.10.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            platform: win32
            arch: x64
            asset: win-x64-portable.zip
            include_helper: true
          - label: Linux x64
            os: ubuntu-latest
            platform: linux
            arch: x64
            asset: linux-x64.zip
            include_helper: false
          - label: macOS x64
            os: macos-13
            platform: darwin
            arch: x64
            asset: macos-x64.zip
            include_helper: false
          - label: macOS arm64
            os: macos-latest
            platform: darwin
            arch: arm64
            asset: macos-arm64.zip
            include_helper: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up .NET
        if: ${{ matrix.include_helper }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: npm ci

      - name: Build native terminal helper
        if: ${{ matrix.include_helper }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path release-work/coss-terminal-helper | Out-Null

          dotnet publish native/coss-terminal-helper/CosS.TerminalHelper.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            -o release-work/coss-terminal-helper

      - name: Package Electron app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "RELEASE_TAG is empty. Push a v* tag or provide workflow_dispatch input 'tag'."
          }

          New-Item -ItemType Directory -Force -Path release-assets, release-work | Out-Null

          $platform = "${{ matrix.platform }}"
          $arch = "${{ matrix.arch }}"
          $folder = "CosS-$platform-$arch"
          $asset = "release-assets/CosS-Desktop-$tag-${{ matrix.asset }}"

          $packagerArgs = @(
            ".",
            "CosS",
            "--platform=$platform",
            "--arch=$arch",
            "--out=release-work",
            "--overwrite",
            "--ignore=^/(\.git|\.github|release-assets|release-work|test-results|playwright-report|tmp|native/.*/(bin|obj))(/|$)",
            "--ignore=^/\.coss(/|$)",
            "--ignore=^/tests(/|$)",
            "--ignore=^/文档(/|$)"
          )

          if ($platform -eq "win32") {
            $packagerArgs += "--icon=src/app-icon.ico"
            $packagerArgs += "--extra-resource=release-work/coss-terminal-helper"
          }

          & npx --yes '@electron/packager@18.3.6' @packagerArgs

          Compress-Archive `
            -Path "release-work/$folder/*" `
            -DestinationPath $asset `
            -Force

          Get-ChildItem release-assets -File | Format-Table Name, Length

      - name: Upload platform asset
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download platform assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          merge-multiple: true
          path: release-assets

      - name: Add source archive and checksums
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          if [ -z "$tag" ]; then
            echo "RELEASE_TAG is empty. Push a v* tag or provide workflow_dispatch input 'tag'." >&2
            exit 1
          fi

          mkdir -p release-assets
          git archive --format=zip --output="release-assets/CosS-Desktop-${tag}-source.zip" HEAD
          (cd release-assets && sha256sum * | sort -k2 > checksums.txt)
          ls -lh release-assets

      - name: Upload combined workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ env.RELEASE_TAG }}
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: CosS Desktop ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release-assets/*
