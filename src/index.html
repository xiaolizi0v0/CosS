<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CosS</title>
    <link rel="icon" href="./app-icon.ico" />
    <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <section class="app-loading-screen" aria-live="polite">
        <div class="app-loading-logo-wrap">
          <img class="app-loading-logo" src="./Logo.png" alt="CosS" draggable="false" />
          <span class="app-loading-sweep" aria-hidden="true"></span>
        </div>
        <div class="app-loading-copy">
          <strong>CosS</strong>
          <span id="appLoadingText">正在加载配置...</span>
        </div>
        <div class="app-loading-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      </section>
    </div>
    <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
